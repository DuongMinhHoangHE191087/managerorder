services:
  managerorder-web:
    build:
      context: ..
      dockerfile: Dockerfile
    image: managerorder:local
    container_name: managerorder-web
    restart: unless-stopped
    env_file:
      - /opt/managerorder/env/managerorder.env
    ports:
      - "127.0.0.1:3100:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  managerorder-zalo:
    profiles: ["zalo"]
    build:
      context: ..
      dockerfile: Dockerfile
    image: managerorder:local
    container_name: managerorder-zalo
    restart: unless-stopped
    env_file:
      - /opt/managerorder/env/managerorder.env
    command:
      [
        "node",
        "--experimental-strip-types",
        "--import",
        "./apps/admin-web/scripts/register-ts-loader.mjs",
        "./apps/admin-web/scripts/zalo-bot-poll.ts"
      ]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
