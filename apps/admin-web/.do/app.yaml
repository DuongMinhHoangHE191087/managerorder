# ============================================================
# DigitalOcean App Platform - App Specification
# Auto-deploys from GitHub on push to main branch
# ============================================================
# Usage: Import this repo in DO App Platform, it will auto-detect

name: managerorder-premium
region: sgp  # Singapore - gần Việt Nam nhất

services:
  - name: web
    environment_slug: node-js
    github:
      repo: <your-github-username>/managerorder
      branch: main
      deploy_on_push: true
    source_dir: premium-admin-web
    build_command: npm run build
    run_command: npm start
    instance_count: 1
    instance_size_slug: basic-xs  # $5/month - 512MB RAM, 1 vCPU. If both polling bots run continuously, consider basic-s for more headroom.
    http_port: 8080
    
    # Environment variables (set in DO dashboard for security).
    # IMPORTANT:
    # - App Platform buildpacks must use `npm run build` + `npm start` for this app.
    # - Do not point App Platform at `.next/standalone/server.js`,
    #   otherwise `/_next/static/*` assets can 404 and the entire layout will break.
    envs:
      - key: NODE_ENV
        value: production
      - key: BUILD_STANDALONE
        value: "true"
        scope: BUILD_TIME
      - key: PORT
        value: "8080"
      - key: NEXT_PUBLIC_API_URL
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: NEXT_PUBLIC_SITE_URL
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: NEXT_PUBLIC_SUPABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: SUPABASE_SERVICE_ROLE_KEY
        scope: RUN_TIME
        type: SECRET
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: PREMIUM_PASSWORD_ENCRYPTION_KEY
        scope: RUN_TIME
        type: SECRET
      - key: ADMIN_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: TELEGRAM_BOT_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: TELEGRAM_ADMIN_CHAT_ID
        scope: RUN_TIME
        type: GENERAL
      - key: TELEGRAM_CHAT_ID
        scope: RUN_TIME
        type: GENERAL
      - key: TELEGRAM_BOT_ACCOUNT_ID
        scope: RUN_TIME
        type: GENERAL
      - key: TELEGRAM_WEBHOOK_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: ZALO_BOT_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: ZALO_BOT_ACCOUNT_ID
        scope: RUN_TIME
        type: GENERAL
      - key: ADMIN_ZALO_USER_IDS
        scope: RUN_TIME
        type: GENERAL
      - key: GEMINI_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: GEMINI_MODEL
        scope: RUN_TIME
        type: GENERAL
        value: gemini-2.5-flash
      - key: REDIS_URL
        scope: RUN_TIME
        type: SECRET
      - key: CRON_SECRET
        scope: RUN_TIME
        type: SECRET
    
    # Health check
    health_check:
      http_path: /api/health
      initial_delay_seconds: 30
      period_seconds: 30
