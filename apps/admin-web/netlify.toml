[build]
  command = "npm run build:ci"
  publish = ".next"

[build.environment]
  NODE_OPTIONS = "--max-old-space-size=4096"
  NODE_VERSION = "22"
  BUILD_STANDALONE = "false"

# ─── Security Headers ───────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # HTTPS enforcement
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # Prevent clickjacking
    X-Frame-Options = "SAMEORIGIN"
    # Prevent MIME type sniffing
    X-Content-Type-Options = "nosniff"
    # Control referrer information
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Restrict browser features
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    # XSS protection fallback
    X-XSS-Protection = "1; mode=block"
    # Content Security Policy — allow self + Supabase + Netlify + Telegram
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.telegram.org https://www.duolingo.com https://id.traodoisub.com https://graph.facebook.com; frame-ancestors 'self' https://web.telegram.org"
